# MIDUS Route B Baselines v2 Configuration
# Data-backed baselines for health, relationship, and subjective_wellbeing domains
# Uses MIDUS 1-3 data (1995-2014)

version: "2.0"
data_source: midus
waves:
  - dataset_id: midus1
    year: "1995-1996"
    n_total: 7108
  - dataset_id: midus2
    year: "2004-2006"
    n_total: 4963
  - dataset_id: midus3
    year: "2013-2014"
    n_total: 3294

variables:
  health:
    - construct: self_rated_health
      variable_codes:
        midus1: A1PA4
        midus2: B1PA1
        midus3: C1PA1
      scale: "1-5"
      value_labels:
        1: Excellent
        2: Very good
        3: Good
        4: Fair
        5: Poor
      scale_direction_issue: "Wave 1 reverses direction (5=excellent)"
      cross_wave_comparable: true
      missingness:
        midus1: 0.15
        midus2: 0.02
        midus3: 0.03
      means:
        midus1: 3.53
        midus2: 2.46
        midus3: 2.57

    - construct: chronic_conditions
      variable_codes:
        midus1: A1SCONDP
        midus2: B1SCONDP
        midus3: C1SCONDP
      scale: "0-27 (count)"
      cross_wave_comparable: true
      missingness:
        midus1: 0.15
        midus2: 0.02
        midus3: 0.03

  relationship:
    - construct: social_support
      variable_codes:
        midus2: B1SCALL
      scale: "1-4 composite"
      cross_wave_comparable: false
      note: "Only available in MIDUS 2 SAQ"
      missingness:
        midus2: 3.9

    - construct: social_satisfaction
      variable_codes:
        midus2: B1SCSAT
      scale: "1-4 composite"
      cross_wave_comparable: false
      note: "Only available in MIDUS 2 SAQ"
      missingness:
        midus2: 4.1

  subjective_wellbeing:
    - construct: life_satisfaction
      variable_codes:
        midus1: A1SSATIS
        midus2: B1SSATIS
        midus3: C1SSATIS
      scale: "0-10"
      value_labels:
        0: Worst possible life
        10: Best possible life
      cross_wave_comparable: true
      missingness:
        midus1: 11.03
        midus2: 18.6
        midus3: 15.1
      means:
        midus1: 7.70
        midus2: 7.76
        midus3: 7.75

    - construct: perceived_mastery
      variable_codes:
        midus1: A1SMASTE
        midus2: B1SMASTE
        midus3: C1SMASTE
      scale: "1-7"
      value_labels:
        1: Strongly disagree
        7: Strongly agree
      cross_wave_comparable: true
      missingness:
        midus1: 11.75
        midus2: 18.3
        midus3: 14.7
      means:
        midus1: 5.84
        midus2: 5.60
        midus3: 5.60

limitations:
  - Cohort specificity (aged 25-74 in 1995)
  - SAQ non-response: 11-19% missing on subjective measures
  - Cross-wave aggregate comparison only (no individual longitudinal linkage)
  - Attrition bias across waves
  - Self-report bias
  - Self-rated health scale direction reversed in Wave 1

transfer_risk:
  health: medium
  relationship: high
  subjective_wellbeing: medium

safety:
  no_raw_data_committed: true
  no_individual_data: true
  no_personal_probabilities: true
  no_life_score: true
