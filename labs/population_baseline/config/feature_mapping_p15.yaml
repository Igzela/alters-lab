# Phase 15 — Feature Mapping
# Extends Phase 14 with actual data inspection results.
# MIDUS variables: data_confirmed via pyreadstat metadata inspection.
# NLSY97 variables: candidate (CSV header inspected, 305k columns, variable names not yet mapped).
# Phase 15 status: MIDUS .sav files parsed, key variables verified in raw data.

features:
  - feature_id: conscientiousness
    construct_id: big5_conscientiousness
    dataset_source_id: midus
    source_variable_candidates:
      - "B1SCON"
      - "B1PACON"
    confirmed_variable_names:
      - "B1SCONS1"
      - "B1SCONS2"
      - "B1PACON"
    confirmation_source: raw_data
    confirmation_status: data_confirmed
    maps_to_predictor_profile_fields:
      - trait_baseline.conscientiousness
    maps_to_behavior_metric_ids:
      - planned_commitment_follow_through_rate
      - career_education_deep_work_minutes
      - abandoned_committed_blocks
    expected_direction: positive
    transformation_notes: >
      Z-score normalize within MIDUS sample. If using 5-item short form,
      note lower reliability. Consider subscale-level analysis.
    missingness_notes: "MIDUS-only. Not available in NLSY97."
    transfer_risk: high
    first_pass_status: preferred

  - feature_id: neuroticism_negative_emotionality
    construct_id: big5_neuroticism
    dataset_source_id: midus
    source_variable_candidates:
      - "B1SNEU"
