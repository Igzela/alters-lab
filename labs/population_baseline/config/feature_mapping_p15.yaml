      - "B1SCONDP"
    confirmation_source: raw_data
    confirmation_status: data_confirmed
    maps_to_predictor_profile_fields:
      - current_context.health_constraints
    maps_to_behavior_metric_ids:
      - sleep_regular_nights
      - moderate_vigorous_activity_minutes
      - avoidable_health_risk_events
    expected_direction: negative
    transformation_notes: >
      Invert self-rated health (5=excellent, 1=poor) so higher = fewer constraints.
      Combine with chronic condition count (log-transformed).
    missingness_notes: "Low missingness. Self-rated health available in both MIDUS and NLSY97."
    transfer_risk: medium
    first_pass_status: preferred

