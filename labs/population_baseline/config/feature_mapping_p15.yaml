    expected_direction: positive
    transformation_notes: >
      Categorize: employed FT, employed PT, unemployed, out of labor force.
      Binary variant: employed (FT+PT) vs not employed.
    missingness_notes: "Low missingness. Some ambiguity in PT/FT classification."
    transfer_risk: medium
    first_pass_status: preferred

