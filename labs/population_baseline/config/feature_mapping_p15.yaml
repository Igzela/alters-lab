    transformation_notes: >
      Z-score normalize. High overlap with conscientiousness —
      consider residualized scores if using both.
    missingness_notes: "MIDUS-only. NLSY97 has locus of control measure (different construct)."
    transfer_risk: medium
    first_pass_status: preferred

  - feature_id: education_status
    construct_id: educational_attainment
    dataset_source_id: nlsy97
    source_variable_candidates:
      - "CV_HGC"
      - "CVC_HIGHEST_DEGREE"
    confirmed_variable_names: []
    confirmation_source: none
    confirmation_status: candidate
    maps_to_predictor_profile_fields:
      - current_context.education_status
    maps_to_behavior_metric_ids:
      - key_milestone_progress
    expected_direction: positive
    transformation_notes: >
      Map to ordinal scale: <HS, HS/GED, Associate's, Bachelor's, Master's+.
      Use degree rather than grade where available.
    missingness_notes: "Low missingness in NLSY97. Self-reported."
    transfer_risk: medium
    first_pass_status: preferred

  - feature_id: employment_status
