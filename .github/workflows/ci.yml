name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd apps/api
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Load sample data for tests
        run: |
          mkdir -p alters/current/alters alters/current/dialogue alters/current/value_alignment
          cp alters/sample/snapshot.yaml alters/current/
          cp alters/sample/branches.yaml alters/current/
          cp alters/sample/reality_trace.yaml alters/current/
          cp alters/sample/alters/*.yaml alters/current/alters/
          # Create minimal test data for files that were removed for privacy
          echo "type: value_alignment" > alters/current/value_alignment/alignment_2026-05-19.yaml
          echo "type: dialogue" > alters/current/dialogue/dialogue_alter_D_2026-05-19.yaml

      - name: Run tests
        run: PYTHONPATH=apps/api/src python -m pytest apps/api/tests/ -q

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: cd apps/web && npm ci

      - name: Build
        run: cd apps/web && npm run build
