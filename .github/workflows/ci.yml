name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd apps/api
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Load sample data for tests
        run: |
          mkdir -p alters/current/alters alters/current/dialogue alters/current/value_alignment
          cp alters/sample/snapshot.yaml alters/current/
          cp alters/sample/branches.yaml alters/current/
          cp alters/sample/reality_trace.yaml alters/current/
          cp alters/sample/alters/*.yaml alters/current/alters/
          # Create minimal test data for files that were removed for privacy
          python3 -c "
          import yaml
          # value_alignment
          va = {'value_alignment': {'provisional_commitment': {'selected_branch': 'branch_D', 'selected_alter': 'alter_D'}, 'status': 'human_confirmed_static_artifact'}}
          with open('alters/current/value_alignment/alignment_2026-05-19.yaml', 'w') as f:
              yaml.dump(va, f, default_flow_style=False)
          # dialogue
          dl = {'dialogue': {'status': 'human_confirmed_static_artifact', 'alter_id': 'alter_D'}}
          with open('alters/current/dialogue/dialogue_alter_D_2026-05-19.yaml', 'w') as f:
              yaml.dump(dl, f, default_flow_style=False)
          # add personality_drift to alter files
          import glob
          for path in glob.glob('alters/current/alters/alter_*.yaml'):
              with open(path) as f:
                  data = yaml.safe_load(f) or {}
              data['personality_drift'] = {'detected': False}
              with open(path, 'w') as f:
                  yaml.dump(data, f, default_flow_style=False)
          "

      - name: Run tests
        run: PYTHONPATH=apps/api/src python -m pytest apps/api/tests/ -q

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: cd apps/web && npm ci

      - name: Build
        run: cd apps/web && npm run build
