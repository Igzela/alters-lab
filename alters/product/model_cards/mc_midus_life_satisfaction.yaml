# Model Card: MIDUS Life Satisfaction
# Demoted to lab_only: no meaningful improvement over baseline after Tier 1 enhancements.

model_id: mc_midus_life_satisfaction
source_dataset_ids:
  - midus2
outcome_id: wellbeing_composite
feature_mapping_ids:
  - chronic_conditions
  - social_closeness
  - social_integration
  - personal_mastery
  - neuroticism
  - age
  - sex
  - sleep_hours
model_family: logistic_regression
training_status: trained
evaluation_summary: >
  Logistic regression predicting high_life_satisfaction (>=7) from MIDUS-2 baseline
  with isotonic calibration and IterativeImputer. 8 features (B1SSATIS excluded
  for leakage prevention), 1,067 usable rows. AUC=0.674, Brier=0.2182.
  Marginal AUC gain (+0.006), no Brier improvement.
calibration_metrics:
  brier_score: 0.2182
  calibration_slope: null
  calibration_intercept: null
  auc: 0.674
  r2: null
  n_train: 853
  n_test: 214
  calibration_bins: null
transfer_risk: medium
approved_for_route_b: false
artifact_class: calibrated_model
approval_level: lab_only
approval_reason: >
  Passes quality gate (AUC≥0.6, Brier≤0.25) but marginal improvement only.
  AUC +0.006, Brier +0.0002. Effective sample (1,067) too small.
  Promoted to data_backed_baseline at artifact level.
approval_blockers:
  - "Marginal AUC improvement (0.668 → 0.674, +0.9%)"
  - "No Brier improvement (0.2180 → 0.2182)"
  - "n_test=214 too small for reliable calibration assessment"
limitations:
  - "MIDUS-2 cross-sectional sample: 1,067 usable respondents"
  - "Cross-domain prediction from single-wave data"
  - "Marginal improvement only after Tier 1 enhancements"
  - "B1SSATIS excluded from features to prevent leakage"
  - "Use as descriptive baseline, not strong predictive model"
