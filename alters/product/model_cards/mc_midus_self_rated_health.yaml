# Model Card: MIDUS Self-Rated Health
# Demoted to lab_only: no meaningful improvement over baseline after Tier 1 enhancements.

model_id: mc_midus_self_rated_health
source_dataset_ids:
  - midus2
outcome_id: health_composite
feature_mapping_ids:
  - chronic_conditions
  - social_closeness
  - social_integration
  - life_satisfaction
  - personal_mastery
  - neuroticism
  - age
  - sex
  - sleep_hours
model_family: logistic_regression
training_status: trained
evaluation_summary: >
  Logistic regression predicting health_good_excellent from MIDUS-2 baseline
  with isotonic calibration and IterativeImputer. 9 features, 1,067 usable rows.
  AUC=0.767, Brier=0.1568. No meaningful improvement over v3 baseline (AUC was 0.772).
  Effective sample too small for additional features to help.
calibration_metrics:
  brier_score: 0.1568
  calibration_slope: null
  calibration_intercept: null
  auc: 0.767
  r2: null
  n_train: 853
  n_test: 214
  calibration_bins: null
transfer_risk: medium
approved_for_route_b: false
artifact_class: calibrated_model
approval_level: lab_only
approval_reason: >
  Passes quality gate (AUC≥0.6, Brier≤0.25) but no meaningful improvement over
  baseline. AUC decreased from 0.772 to 0.767. Effective sample (1,067) too small
  for Tier 1 enhancements to help. Promoted to data_backed_baseline at artifact level.
approval_blockers:
  - "No AUC improvement over baseline (0.772 → 0.767)"
  - "No Brier improvement over baseline (0.1504 → 0.1568)"
  - "n_test=214 too small for reliable calibration assessment"
limitations:
  - "MIDUS-2 cross-sectional sample: 1,067 usable respondents"
  - "Cross-domain prediction from single-wave data"
  - "No meaningful improvement after Tier 1 enhancements"
  - "Effective sample too small for 9 features + interactions"
  - "Scale direction: M2 health 1=excellent (lower=better)"
  - "Use as descriptive baseline, not strong predictive model"
