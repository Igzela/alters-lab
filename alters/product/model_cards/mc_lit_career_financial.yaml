training_status: validated
evaluation_summary: >
  Literature prior based on meta-analyses of personality-outcome correlations.
  Roberts et al. (2007) meta-analysis covers job performance and income.
  Heckman et al. (2006) NLSY79 analysis links non-cognitive skills to earnings.
  Moffitt et al. (2011) Dunedin cohort links self-control to financial outcomes.
