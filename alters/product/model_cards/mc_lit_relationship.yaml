# Model Card: Literature priors for relationship domain
# NOT a trained model. Curated population-level literature anchors.

model_id: mc_lit_relationship
source_dataset_ids:
  - social_relationships_mortality_meta
  - midus_longitudinal
outcome_id: relationship_composite
feature_mapping_ids:
  - social_integration_construct
model_family: literature_prior_only
training_status: validated
evaluation_summary: >
  Literature prior based on Holt-Lunstad et al. (2010) meta-analysis of 148
  prospective studies (308,849 participants) showing social integration predicts
  mortality and wellbeing. MIDUS data confirms social support quality and strain
  predict relationship outcomes across waves.
calibration_metrics:
  brier_score: null
  calibration_slope: null
  calibration_intercept: null
  auc: null
  r2: null
transfer_risk: medium
approved_for_route_b: false
artifact_class: contextual_prior
approval_level: lab_only
approval_reason: "Literature-only prior — no actual data backing. Directional anchor only."
approval_blockers:
  - "No actual dataset used"
  - "No calibration metrics"
  - "No baseline table"
limitations:
  - "Social integration is measured differently across studies"
  - "Meta-analysis combines diverse relationship measures"
  - "Cultural variation in relationship norms not fully captured"
  - "Does not distinguish romantic, familial, or friendship relationships"
  - "Quality vs quantity of connections matters but is hard to separate"
  - "Literature priors are directional anchors, not predictions"
