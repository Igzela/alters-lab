# Alters System — Branch Definitions
# Phase 0: Canonical structure. Branches are generated from confirmed snapshot anchors.

branch_discovery:
  status: "not_started"
  source_snapshot_ref: "alters/current/snapshot.yaml"
  requires_snapshot_phase: "completed"
  pipeline:
    step_1_tension_extraction: { output: [] }
    step_2_structural_branch_identification: { output: [] }
    step_3_convergence: { output: [] }
  quality_rules:
    reject_result_differences: true
    reject_parameter_differences: true
    require_mutual_incompatibility: true
    require_incompatible_with: true
    min_branches: 3
    max_branches: 4

branches: []

branch_template:
  id: ""
  core_choice: ""
  structural_commitment: ""
  key_tension_resolved: ""
  incompatible_with: []
  preserves: []
  sacrifices: []
  validation_signal_30d: []
  invalid_if: []
