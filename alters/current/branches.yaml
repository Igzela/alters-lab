# Alters System — Branch Definitions
# Phase 0: This is a template. Branches are generated from snapshot anchors.

# Quality rules for valid branches
quality_rules:
  structural_difference: |
    Branches must differ in KIND, not degree.
    "More money" is not a branch. "Corporate vs independent" is a branch.
    Each branch must be mutually incompatible with all others.
  time_horizon: "1.5-2 years"
  min_branches: 2
  max_branches: 5

branches: []
